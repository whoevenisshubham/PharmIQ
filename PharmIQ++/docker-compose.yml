version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pharmez-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharmez_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmez-backend
    working_dir: /app
    command: sh -c "npm ci && npm run prisma:generate && npm run prisma:push && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pharmez_db
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URLS: http://localhost:5173,http://localhost:5174
      JWT_SECRET: pharmez_dev_secret_change_me
      JWT_EXPIRY: 7d
      GEMINI_API_KEY: your_gemini_api_key_here
      MAX_FILE_SIZE: 10485760
      UPLOAD_DIR: ./uploads
    restart: unless-stopped

volumes:
  postgres_data:
  backend_node_modules: